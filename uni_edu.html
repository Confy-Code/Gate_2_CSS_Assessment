<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/logo.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <title>Uni4Edu: Study Abroad, Summer Schools and Language Courses</title>

    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <div class="hidden lg:block h-12 w-full rounded-b-none border-b border-slate-200 bg-[#fcfcfc]">
        <div class="font-montserrat bg-[#fcfcfc] h-9 w-full flex items-center justify-end text-black gap-4 px-12">
            <a href="#" class="cursor-pointer text-base">Become an Agent</a>
            <a  href="#" class="cursor-pointer  text-base ">Partnership</a>
        </div>
    </div>

    <!-- Mobile invisibility of the nav-bar -->
    
    <div class="lg:hidden block h-20 w-full rounded-b-none border-b border-slate-200 bg-[#fcfcfc]">
        <div class="flex items-center justify-between w-full h-full px-6">
            
            <img src="/logo.png" alt="Uni4Edu Logo" class="cursor-pointer h-12 w-auto object-contain">

            <div class="flex items-center text-gray-800 gap-6">
                <button class="text-cyan-500 text-lg p-1 rounded-full hover:bg-gray-100" aria-label="Search">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>

                <div class="flex items-center gap-1 cursor-pointer select-none">
                    <span class="inline-block w-4.5 h-3 overflow-hidden rounded-sm bg-gray-200">
                        <img src="https://flagcdn.com/gb.svg" alt="UK Flag" class="w-full h-full" />
                    </span>
                    <span class="text-xs font-bold tracking-wide uppercase font-montserrat">EN</span>
                    <span class="text-[9px] text-black font-bold relative bottom-[0.5px]">▼</span>
                </div>

                <button class="flex flex-col gap-1.5 justify-center items-center w-10 h-10 p-1 rounded-full hover:bg-gray-100" aria-label="Open Menu">
                    <span class="block w-6 h-0.5 bg-black rounded-full font-bold"></span>
                    <span class="block w-6 h-0.5 bg-black rounded-full"></span>
                    <span class="block w-6 h-0.5 bg-black rounded-full"></span>
                </button>



            </div>

        </div>
    </div>

</body>
</html>
